<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>UTN GolMundial 2026</title>
    <h:outputStylesheet library="css" name="estilos.css" />
    <style>
        .hero {
            position: relative;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        .hero video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            z-index: -2;
            object-fit: cover;
        }
        .hero .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10,15,20,0.55);
            z-index: -1;
        }
        .hero h1 {
            font-size: 3em;
            margin-bottom: 0;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
        }
        .hero p {
            font-size: 1.3em;
            margin-top: 5px;
            margin-bottom: 30px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
        }
        .hero .botones .ui-button {
            margin: 0 8px;
            padding: 10px 24px;
            font-size: 1em;
        }
    </style>
</h:head>
<h:body>

    <div class="hero">
         <video id="videoFondo" autoplay="autoplay" muted="muted" loop="loop" playsinline="playsinline">
            <source src="#{resource['videos/inicio2.mp4']}" type="video/mp4" />
        </video>
        <div class="overlay"></div>
<!--
        <button type="button" class="boton-sonido"
                onclick="document.getElementById('videoFondo').muted = false;">
            Activar sonido
        </button>
-->

        <h1>
    <h:graphicImage library="images" name="balon-m.png" style="height:48px; vertical-align:middle; margin-right:12px;" />
    UTN GolMundial 2026
</h1>
        <p>Haz pronósticos, compite y sigue la Copa del Mundo con tus amigos.</p>

        <h:form>
            <div class="botones boton-dorado">
                <p:button value="Ingresar" outcome="/login.xhtml" />
                <p:button value="Registrate" outcome="/register.xhtml" />
                <p:button value="Continuar como invitado" outcome="/login.xhtml" />
            </div>
        </h:form>
    </div>

</h:body>
</html>
