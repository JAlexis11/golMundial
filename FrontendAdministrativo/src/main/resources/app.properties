# ============================================================
# Configuracion del Frontend Publico - UTN GolMundial 2026
# ============================================================
#
# Cada integrante del equipo corre el backend (Wallet, Predicciones,
# Ranking, Transacciones) en SU PROPIA computadora, dentro de la misma
# red/router. Por eso la IP no puede quedar fija en el codigo: cada quien
# debe poner aqui la IP de la maquina donde esta corriendo ESE backend.
#
# Como saber tu IP (la de quien corre el backend):
#   Windows -> abrir cmd -> escribir "ipconfig" -> buscar "Direccion IPv4"
#   Ejemplo de resultado: 192.168.1.45
#
# Luego reemplaza abajo por: http://TU_IP:5253
#
backend.baseUrl=http://192.168.0.130:5253

# Usuario de prueba que ya existe en la base de datos del backend de arriba.
# Se usa mientras el login (AuthServiceMock) no este conectado a ese mismo
# backend. Wallet, Historial y Predicciones comparten este mismo usuario.
backend.usuarioId=100
